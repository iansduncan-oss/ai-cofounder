global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "n8n"
  routes:
    - match:
        severity: critical
      receiver: "n8n"
      continue: true
    - match:
        severity: critical
      receiver: "discord-direct"

receivers:
  - name: "n8n"
    webhook_configs:
      - url: "http://n8n:5678/webhook/alertmanager-triage"
        send_resolved: true

  - name: "discord-direct"
    webhook_configs:
      - url: "http://alertmanager-discord:9094"
        send_resolved: true

templates: []
