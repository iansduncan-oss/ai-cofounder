global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord"

receivers:
  - name: "discord"
    webhook_configs:
      # Discord webhooks need /slack suffix for Alertmanager compatibility
      # Create a webhook in Discord: Server Settings > Integrations > Webhooks
      # Then append /slack to the URL, e.g.:
      # https://discord.com/api/webhooks/XXXXX/YYYYY/slack
      - url: "REPLACE_WITH_DISCORD_WEBHOOK_URL/slack"
        send_resolved: true

templates: []
