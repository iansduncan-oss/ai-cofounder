global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord"

receivers:
  - name: "discord"
    webhook_configs:
      - url: "http://n8n:5678/webhook/alertmanager-triage"
        send_resolved: true

templates: []
