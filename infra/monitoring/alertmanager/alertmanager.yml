global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "discord"

receivers:
  - name: "discord"
    webhook_configs:
      - url: "${ALERTMANAGER_DISCORD_WEBHOOK_URL}"
        send_resolved: true

templates: []
