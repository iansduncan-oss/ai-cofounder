global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "agent-server"
    metrics_path: /metrics
    static_configs:
      - targets: ["agent-server:3100"]
        labels:
          service: "agent-server"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
