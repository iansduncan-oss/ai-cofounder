groups:
  - name: agent-server
    rules:
      - alert: AgentServerDown
        expr: up{job="agent-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent server is down"
          description: "Agent server has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_errors_total{job="agent-server"}[5m]))
          / sum(rate(http_requests_total{job="agent-server"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on agent-server"
          description: "5xx error rate is above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: HighMemoryUsage
        expr: process_memory_rss_bytes{job="agent-server"} > 838860800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent server memory usage high"
          description: "RSS memory is above 800MB for 5 minutes (current: {{ $value | humanize1024 }}B)."

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: DeadLetterQueueHigh
        expr: dlq_size_total{job="agent-server"} > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue size is high"
          description: "DLQ has {{ $value }} jobs for more than 5 minutes. Investigate failed jobs."

      - alert: StaleJobsDetected
        expr: queue_stale_jobs{job="agent-server"} > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Stale jobs detected in queue {{ $labels.queue }}"
          description: "{{ $value }} job(s) in {{ $labels.queue }} have been active for more than 30 minutes."

      - alert: HighJobFailureRate
        expr: |
          sum by (queue) (rate(queue_jobs_failed_total{job="agent-server"}[10m]))
          / (sum by (queue) (rate(queue_jobs_completed_total{job="agent-server"}[10m])) + sum by (queue) (rate(queue_jobs_failed_total{job="agent-server"}[10m])))
          > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High job failure rate in queue {{ $labels.queue }}"
          description: "Job failure rate is above 10% for the last 10 minutes (current: {{ $value | humanizePercentage }})."

      - alert: BackupStale
        expr: (time() - backup_last_success_timestamp{job="agent-server"}) > 129600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup is stale"
          description: "No successful backup recorded in the last 36 hours."

      - alert: RedisDown
        expr: redis_up{job="agent-server"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down"
          description: "Redis has been unreachable for more than 2 minutes. Queues, pub/sub, and caching are unavailable."

      - alert: AllLlmProvidersDown
        expr: |
          count(
            sum by (provider) (rate(llm_requests_total{status="error", job="agent-server"}[5m]))
            / sum by (provider) (rate(llm_requests_total{job="agent-server"}[5m]))
            > 0.5
          )
          == count(
            count by (provider) (llm_requests_total{job="agent-server"})
          )
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "All LLM providers are failing"
          description: "Every LLM provider has an error rate above 50% for the last 5 minutes. Agent operations are severely degraded."

      - alert: QueueJobAgeHigh
        expr: queue_oldest_waiting_job_age_seconds{job="agent-server"} > 3600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Queue {{ $labels.queue }} has old waiting jobs"
          description: "Oldest waiting job in {{ $labels.queue }} is {{ $value | humanizeDuration }} old (threshold: 1h)."

      - alert: ConnectionPoolExhaustion
        expr: pg_stat_activity_count{datname="avion"} > (pg_settings_max_connections * 0.85)
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool near exhaustion"
          description: "PostgreSQL connections ({{ $value }}) are above 85% of max. Risk of connection refusal."

      - alert: N8nDown
        expr: absent(container_last_seen{name=~".*n8n.*"}) or (time() - container_last_seen{name=~".*n8n.*"}) > 120
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "n8n container is down"
          description: "n8n container has not been seen for more than 2 minutes. Workflow automation is unavailable."

  - name: infrastructure
    rules:
      - alert: HighDiskUsage
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on root partition"
          description: "Root partition is {{ $value | humanize }}% full."

      - alert: CriticalDiskUsage
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk usage on root partition"
          description: "Root partition is {{ $value | humanize }}% full — immediate action required."

      - alert: HighContainerMemory
        expr: (container_memory_usage_bytes{name=~"ai-cofounder.*"} / container_spec_memory_limit_bytes{name=~"ai-cofounder.*"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage high"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: HighHostMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High host memory usage"
          description: "Host memory usage is {{ $value | humanizePercentage }}."

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count{datname="avion"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Avion database has {{ $value }} active connections (threshold: 80)."

  - name: llm-health
    rules:
      - alert: LlmProviderHighErrorRate
        expr: |
          sum by (provider) (rate(llm_requests_total{status="error"}[10m]))
          / sum by (provider) (rate(llm_requests_total[10m]))
          > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} high error rate"
          description: "Provider {{ $labels.provider }} error rate is {{ $value | humanizePercentage }} over 10 minutes."

      - alert: LlmHighLatency
        expr: histogram_quantile(0.95, sum by (le, provider) (rate(llm_request_duration_seconds_bucket[10m]))) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} high latency"
          description: "Provider {{ $labels.provider }} p95 latency is {{ $value | humanize }}s."

  - name: http
    rules:
      - alert: HighHttpLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job="agent-server"}[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP latency on agent-server"
          description: "p99 HTTP latency is {{ $value | humanize }}s (threshold: 5s)."

  - name: budget
    rules:
      - alert: DailyBudgetExhausted
        expr: llm_daily_cost_usd{job="agent-server"} >= llm_daily_budget_usd{job="agent-server"}
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Daily LLM budget exhausted"
          description: "Daily LLM spending ({{ $value | humanize }}USD) has reached the configured budget. Further LLM calls will be rejected."

      - alert: DailyBudgetWarning
        expr: llm_daily_cost_usd{job="agent-server"} / llm_daily_budget_usd{job="agent-server"} > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Daily LLM budget at 80%"
          description: "Daily LLM spending is above 80% of budget ({{ $value | humanizePercentage }})."

      - alert: WeeklyBudgetWarning
        expr: llm_weekly_cost_usd{job="agent-server"} / llm_weekly_budget_usd{job="agent-server"} > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Weekly LLM budget at 80%"
          description: "Weekly LLM spending is above 80% of budget ({{ $value | humanizePercentage }})."

  - name: security
    rules:
      - alert: HighIpBanRate
        expr: rate(security_ip_bans_total{job="agent-server"}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated IP ban rate — possible attack"
          description: "IPs are being banned at {{ $value | humanize }} per second over the last 5 minutes. Possible scanner/attack activity."

      - alert: HoneypotSpike
        expr: rate(security_honeypot_hits_total{job="agent-server"}[5m]) > 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High honeypot traffic — possible reconnaissance"
          description: "Honeypot paths are being hit at {{ $value | humanize }} requests/sec — scanners are probing the server."

  - name: circuit-breakers
    rules:
      - alert: LlmCircuitBreakerOpen
        expr: llm_circuit_breaker_state{job="agent-server"} == 1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} circuit breaker is OPEN"
          description: "Provider {{ $labels.provider }} has had too many consecutive failures — circuit breaker is tripped. Traffic is falling back to other providers."

      - alert: DeployCircuitBreakerPaused
        expr: deploy_circuit_breaker_paused{job="agent-server"} == 1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Deploy circuit breaker is PAUSED"
          description: "Deployments are paused due to consecutive failures. Manual intervention required to resume."

  - name: sandbox
    rules:
      - alert: SandboxHighFailureRate
        expr: |
          sum(rate(sandbox_executions_total{status="failure", job="agent-server"}[10m]))
          / sum(rate(sandbox_executions_total{job="agent-server"}[10m]))
          > 0.3
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Sandbox code execution failure rate high"
          description: "Sandbox executions are failing at {{ $value | humanizePercentage }} over 10 minutes (threshold: 30%)."

      - alert: SandboxOomKills
        expr: rate(sandbox_oom_kills_total{job="agent-server"}[10m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sandbox containers hitting OOM"
          description: "Sandbox containers are being OOM-killed at {{ $value | humanize }} per second — agent code is exceeding memory limits."
