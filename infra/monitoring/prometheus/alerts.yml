groups:
  - name: agent-server
    rules:
      - alert: AgentServerDown
        expr: up{job="agent-server"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Agent server is down"
          description: "Agent server has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          sum(rate(http_errors_total{job="agent-server"}[5m]))
          / sum(rate(http_requests_total{job="agent-server"}[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on agent-server"
          description: "5xx error rate is above 5% for the last 5 minutes (current: {{ $value | humanizePercentage }})."

      - alert: HighMemoryUsage
        expr: process_memory_rss_bytes{job="agent-server"} > 838860800
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Agent server memory usage high"
          description: "RSS memory is above 800MB for 5 minutes (current: {{ $value | humanize1024 }}B)."

      - alert: PrometheusTargetDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Prometheus target {{ $labels.job }} is down"
          description: "Target {{ $labels.instance }} has been down for more than 2 minutes."

      - alert: DeadLetterQueueHigh
        expr: dlq_size_total{job="agent-server"} > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dead letter queue size is high"
          description: "DLQ has {{ $value }} jobs for more than 5 minutes. Investigate failed jobs."

      - alert: StaleJobsDetected
        expr: queue_stale_jobs{job="agent-server"} > 0
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Stale jobs detected in queue {{ $labels.queue }}"
          description: "{{ $value }} job(s) in {{ $labels.queue }} have been active for more than 30 minutes."

      - alert: HighJobFailureRate
        expr: |
          sum by (queue) (rate(queue_jobs_failed_total{job="agent-server"}[10m]))
          / (sum by (queue) (rate(queue_jobs_completed_total{job="agent-server"}[10m])) + sum by (queue) (rate(queue_jobs_failed_total{job="agent-server"}[10m])))
          > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High job failure rate in queue {{ $labels.queue }}"
          description: "Job failure rate is above 10% for the last 10 minutes (current: {{ $value | humanizePercentage }})."

      - alert: BackupStale
        expr: (time() - backup_last_success_timestamp{job="agent-server"}) > 129600
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Backup is stale"
          description: "No successful backup recorded in the last 36 hours."

  - name: infrastructure
    rules:
      - alert: HighDiskUsage
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on root partition"
          description: "Root partition is {{ $value | humanize }}% full."

      - alert: CriticalDiskUsage
        expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk usage on root partition"
          description: "Root partition is {{ $value | humanize }}% full — immediate action required."

      - alert: HighContainerMemory
        expr: (container_memory_usage_bytes{name=~"ai-cofounder.*"} / container_spec_memory_limit_bytes{name=~"ai-cofounder.*"}) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} memory usage high"
          description: "Container {{ $labels.name }} is using {{ $value | humanizePercentage }} of its memory limit."

      - alert: HighHostMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High host memory usage"
          description: "Host memory usage is {{ $value | humanizePercentage }}."

      - alert: HighDatabaseConnections
        expr: pg_stat_activity_count{datname="avion"} > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Avion database has {{ $value }} active connections (threshold: 80)."

  - name: llm-health
    rules:
      - alert: LlmProviderHighErrorRate
        expr: |
          sum by (provider) (rate(llm_requests_total{status="error"}[10m]))
          / sum by (provider) (rate(llm_requests_total[10m]))
          > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} high error rate"
          description: "Provider {{ $labels.provider }} error rate is {{ $value | humanizePercentage }} over 10 minutes."

      - alert: LlmHighLatency
        expr: histogram_quantile(0.95, sum by (le, provider) (rate(llm_request_duration_seconds_bucket[10m]))) > 30
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "LLM provider {{ $labels.provider }} high latency"
          description: "Provider {{ $labels.provider }} p95 latency is {{ $value | humanize }}s."

  - name: http
    rules:
      - alert: HighHttpLatency
        expr: histogram_quantile(0.99, sum by (le) (rate(http_request_duration_seconds_bucket{job="agent-server"}[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP latency on agent-server"
          description: "p99 HTTP latency is {{ $value | humanize }}s (threshold: 5s)."
