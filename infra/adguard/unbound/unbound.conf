server:
    # Basic
    verbosity: 0
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no
    prefer-ip6: no

    # Trust the DNSSEC root key. mvance/unbound:1.23.0 ships with a
    # pre-installed root.key at /opt/unbound/etc/unbound/var/root.key
    # and auto-updates it.
    auto-trust-anchor-file: "var/root.key"

    # Reasonable cache sizes for a single-VPS homelab
    num-threads: 2
    msg-cache-size: 50m
    rrset-cache-size: 100m
    cache-min-ttl: 300
    cache-max-ttl: 86400
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    serve-expired-ttl: 86400

    # Privacy
    hide-identity: yes
    hide-version: yes
    qname-minimisation: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    # Access control — only the adguard container on the internal
    # docker network can query. Container IPs come from 172.16.0.0/12.
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 0.0.0.0/0 refuse

    # Local zones for our own hostnames — filled by a-records.conf
    include: /opt/unbound/etc/unbound/a-records.conf

    # Root hints are baked into the image; no need to point at a file.

remote-control:
    control-enable: no
