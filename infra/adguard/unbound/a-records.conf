# Local A records served by Unbound for aviontechs-internal hostnames.
# These resolve only on the homelab/Tailscale network — never leave
# Unbound's cache.
#
# Add additional local overrides as you bring services online.

# Example — uncomment and edit as needed. These override anything
# AdGuard or upstream DNS would return, so use them for services that
# live behind the Tailscale interface only.

# local-data: "dashboard.avion.internal. 300 IN A 100.64.0.1"
# local-data-ptr: "100.64.0.1 dashboard.avion.internal."
#
# local-data: "grafana.avion.internal. 300 IN A 100.64.0.1"
# local-data-ptr: "100.64.0.1 grafana.avion.internal."
