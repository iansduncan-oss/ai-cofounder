<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#7c3aed" />
    <title>Jarvis Voice</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Jarvis</h1>
        <div id="status-text">Ready</div>
      </header>

      <main>
        <div id="ring-container">
          <canvas id="waveform" width="240" height="240"></canvas>
          <div id="ring" class="idle">
            <div class="ring-inner"></div>
          </div>
        </div>

        <div id="transcript-area">
          <div id="user-transcript" class="transcript hidden"></div>
          <div id="agent-transcript" class="transcript hidden"></div>
        </div>

        <div id="conversation">
          <!-- Messages inserted here -->
        </div>

        <div id="controls">
          <button id="mic-btn" aria-label="Tap to speak" data-state="idle">
            <svg id="mic-icon" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path
                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"
              />
              <path
                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
              />
            </svg>
            <svg id="stop-icon" class="hidden" viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <rect x="6" y="6" width="12" height="12" rx="2" />
            </svg>
          </button>
          <button id="auto-listen-btn" aria-label="Toggle continuous listening" title="Auto-listen after response">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M7 7h10v10H7z" opacity="0.3"/>
              <path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/>
            </svg>
          </button>
          <div id="input-fallback">
            <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
            <button id="send-btn">Send</button>
          </div>
        </div>
      </main>

      <footer>
        <span id="provider-info"></span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
