<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Co-Founder — Voice</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>AI Co-Founder</h1>
        <div id="status-text">Ready</div>
      </header>

      <main>
        <div id="ring-container">
          <div id="ring" class="idle">
            <div class="ring-inner"></div>
          </div>
        </div>

        <div id="conversation">
          <!-- Messages inserted here -->
        </div>

        <div id="controls">
          <button id="mic-btn" aria-label="Hold to speak">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path
                d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"
              />
              <path
                d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
              />
            </svg>
          </button>
          <div id="input-fallback">
            <input type="text" id="text-input" placeholder="Type a message..." autocomplete="off" />
            <button id="send-btn">Send</button>
          </div>
        </div>
      </main>

      <footer>
        <span id="provider-info"></span>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
