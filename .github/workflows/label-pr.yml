name: Label PR

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          configuration-path: .github/labeler.yml

      - name: Size label
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          PR_NUMBER: "${{ github.event.pull_request.number }}"
          REPO: "${{ github.repository }}"
        run: |
          ADDITIONS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.additions')
          DELETIONS=$(gh api "repos/${REPO}/pulls/${PR_NUMBER}" --jq '.deletions')
          TOTAL=$((ADDITIONS + DELETIONS))

          if [ "$TOTAL" -lt 10 ]; then
            SIZE="size:XS"
          elif [ "$TOTAL" -lt 50 ]; then
            SIZE="size:S"
          elif [ "$TOTAL" -lt 200 ]; then
            SIZE="size:M"
          elif [ "$TOTAL" -lt 500 ]; then
            SIZE="size:L"
          else
            SIZE="size:XL"
          fi

          # Remove existing size labels
          for label in "size:XS" "size:S" "size:M" "size:L" "size:XL"; do
            gh api "repos/${REPO}/issues/${PR_NUMBER}/labels/${label}" -X DELETE 2>/dev/null || true
          done

          # Add new size label
          gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" -f "labels[]=${SIZE}"
