name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        id: deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=30 ian@avion-stack-01 << 'DEPLOY'
          set -e
          cd /opt/ai-cofounder

          echo "==> Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "==> Building Docker images..."
          sudo docker build -t ai-cofounder-agent-server:latest -f apps/agent-server/Dockerfile .
          sudo docker build -t ai-cofounder-discord-bot:latest -f apps/discord-bot/Dockerfile .
          sudo docker build -t ai-cofounder-slack-bot:latest -f apps/slack-bot/Dockerfile .

          echo "==> Restarting services..."
          sudo docker compose -f docker-compose.prod.yml up -d --force-recreate

          echo "==> Starting n8n..."
          sudo docker compose -f docker-compose.n8n.yml up -d

          echo "==> Starting Uptime Kuma..."
          sudo docker compose -f docker-compose.uptimekuma.yml up -d

          echo "==> Restarting monitoring stack..."
          sudo docker compose -f docker-compose.monitoring.yml up -d

          echo "==> Waiting for health check..."
          sleep 10
          curl -sf http://localhost:3100/health || { echo "Health check failed!"; exit 1; }

          echo "==> Cleaning up old images..."
          sudo docker image prune -f

          echo "==> Deploy complete!"
          DEPLOY

      - name: Notify Discord — Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Deploy Successful\",\"description\":\"AI Cofounder deployed to production.\",\"color\":2278400,\"fields\":[{\"name\":\"Commit\",\"value\":\"\`${SHORT_SHA}\`\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"main\",\"inline\":true}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$DISCORD_WEBHOOK"

      - name: Notify Discord — Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Deploy FAILED\",\"description\":\"AI Cofounder deploy to production failed!\",\"color\":15548997,\"fields\":[{\"name\":\"Commit\",\"value\":\"\`${SHORT_SHA}\`\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"main\",\"inline\":true},{\"name\":\"Action\",\"value\":\"[View logs](https://github.com/${REPO}/actions/runs/${RUN_ID})\",\"inline\":false}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$DISCORD_WEBHOOK"
