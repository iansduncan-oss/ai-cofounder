name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/ai-cofounder

            echo "==> Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Building Docker images..."
            docker build -t ai-cofounder-agent-server:latest -f apps/agent-server/Dockerfile .
            docker build -t ai-cofounder-discord-bot:latest -f apps/discord-bot/Dockerfile .

            echo "==> Restarting services..."
            docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "==> Waiting for health check..."
            sleep 10
            curl -sf http://localhost:3100/health || { echo "Health check failed!"; exit 1; }

            echo "==> Cleaning up old images..."
            docker image prune -f

            echo "==> Deploy complete!"
