name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build and validate without deploying"
        required: false
        type: boolean
        default: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Dry-run validation: build, lint, test, docker build, secrets check ──
  validate:
    name: Validate (dry-run)
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ai_cofounder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ai_cofounder_test
      ANTHROPIC_API_KEY: test-key-not-real
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes typecheck)
        run: npm run build

      - name: Push schema to test DB
        run: npm run db:push

      - name: Test
        run: npm run test

      - name: Build Docker images (no push)
        run: |
          docker build -f apps/agent-server/Dockerfile -t ai-cofounder-agent-server:dry-run .
          docker build -f apps/discord-bot/Dockerfile -t ai-cofounder-discord-bot:dry-run .
          docker build -f apps/slack-bot/Dockerfile -t ai-cofounder-slack-bot:dry-run .

  check-secrets:
    name: Check Required Secrets
    if: inputs.dry_run == true
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          HAS_TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY != '' }}
          HAS_DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL != '' }}
          HAS_DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET != '' }}
          HAS_DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL != '' }}
        run: |
          echo "## Required Secrets Check" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          MISSING=0
          check() {
            if [ "$2" = "true" ]; then
              echo "- :white_check_mark: \`$1\`" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "- :x: \`$1\` **MISSING**" >> "$GITHUB_STEP_SUMMARY"
              MISSING=$((MISSING + 1))
            fi
          }

          check "TAILSCALE_AUTHKEY" "$HAS_TAILSCALE_AUTHKEY"
          check "DEPLOY_WEBHOOK_URL" "$HAS_DEPLOY_WEBHOOK_URL"
          check "DEPLOY_WEBHOOK_SECRET" "$HAS_DEPLOY_WEBHOOK_SECRET"
          check "DISCORD_DEPLOY_WEBHOOK_URL" "$HAS_DISCORD_DEPLOY_WEBHOOK_URL"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "$MISSING" -gt 0 ]; then
            echo ":warning: **$MISSING secret(s) missing** — deploy would fail" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo ":white_check_mark: All deploy secrets configured" >> "$GITHUB_STEP_SUMMARY"
          fi

  dry-run-summary:
    name: Dry Run Summary
    if: inputs.dry_run == true
    needs: [validate, check-secrets]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate deploy readiness summary
        run: |
          echo "## Deploy Dry Run Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`$(git rev-parse --short HEAD)\` — $(git log -1 --pretty=%s)" >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch:** \`$(git rev-parse --abbrev-ref HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Services" >> "$GITHUB_STEP_SUMMARY"
          echo "| Service | Image | Dockerfile |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|-------|------------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| agent-server | \`ai-cofounder-agent-server:latest\` | \`apps/agent-server/Dockerfile\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| discord-bot | \`ai-cofounder-discord-bot:latest\` | \`apps/discord-bot/Dockerfile\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| slack-bot | \`ai-cofounder-slack-bot:latest\` | \`apps/slack-bot/Dockerfile\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Validation" >> "$GITHUB_STEP_SUMMARY"
          echo "- :white_check_mark: Lint passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- :white_check_mark: Build/typecheck passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- :white_check_mark: Tests passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- :white_check_mark: Docker images built" >> "$GITHUB_STEP_SUMMARY"
          echo "- :white_check_mark: Deploy secrets configured" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> **Ready to deploy.** Run without \`dry_run\` or push to \`main\` to deploy." >> "$GITHUB_STEP_SUMMARY"

  # ── Actual deploy (skipped during dry-run) ──
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.dry_run != true) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Notify deploy started
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          PREVIOUS_SHA=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ian@avion-stack-01 \
            "sudo docker inspect --format='{{index .Config.Labels \"git.sha\"}}' ai-cofounder-agent-server:latest 2>/dev/null" || echo "")
          curl -sf -X POST "${DEPLOY_WEBHOOK_URL}/api/deploys/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_SECRET}" \
            -d "{\"event\":\"deploy_started\",\"commitSha\":\"${COMMIT_SHA}\",\"shortSha\":\"${SHORT_SHA}\",\"branch\":\"main\",\"previousSha\":\"${PREVIOUS_SHA}\",\"services\":[\"agent-server\",\"discord-bot\",\"slack-bot\"],\"triggeredBy\":\"ci\"}" \
            || echo "::warning::Deploy webhook notification failed (deploy_started)"

      - name: Deploy via SSH
        id: deploy
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=30 ian@avion-stack-01 bash -s -- "${GITHUB_SHA}" << 'EOF_DEPLOY_SCRIPT'
          set -e
          cd /opt/ai-cofounder

          SHA="$1"
          SHORT_SHA="${SHA:0:7}"

          echo "==> Saving previous image SHA for rollback..."
          PREVIOUS_SHA=$(sudo docker inspect --format='{{index .Config.Labels "git.sha"}}' ai-cofounder-agent-server:latest 2>/dev/null || echo "")

          DEPLOY_START=$(date +%s)

          echo "==> Pulling latest code..."
          git fetch origin main
          git reset --hard origin/main

          echo "==> Validating compose files..."
          for f in docker-compose.prod.yml docker-compose.n8n.yml docker-compose.uptimekuma.yml docker-compose.monitoring.yml; do
            if [ -f "$f" ]; then
              if ! sudo docker compose -f "$f" config --quiet 2>&1; then
                echo "ERROR: Invalid compose file: $f"
                exit 1
              fi
              echo "  ok: $f"
            fi
          done

          echo "==> Building Docker images (tagged: ${SHORT_SHA})..."
          sudo docker build --label "git.sha=${SHA}" -t ai-cofounder-agent-server:${SHA} -t ai-cofounder-agent-server:latest -f apps/agent-server/Dockerfile .
          sudo docker build --label "git.sha=${SHA}" -t ai-cofounder-discord-bot:${SHA} -t ai-cofounder-discord-bot:latest -f apps/discord-bot/Dockerfile .
          sudo docker build --label "git.sha=${SHA}" -t ai-cofounder-slack-bot:${SHA} -t ai-cofounder-slack-bot:latest -f apps/slack-bot/Dockerfile .

          echo "==> Restarting services..."
          sudo docker compose -f docker-compose.prod.yml up -d --force-recreate

          echo "==> Starting n8n..."
          sudo docker compose -f docker-compose.n8n.yml up -d

          echo "==> Starting Uptime Kuma..."
          sudo docker compose -f docker-compose.uptimekuma.yml up -d

          echo "==> Restarting monitoring stack..."
          sudo docker compose -f docker-compose.monitoring.yml up -d

          echo "==> Waiting for health check (up to 30s)..."
          HEALTHY=false
          for i in 1 2 3 4 5 6; do
            sleep 5
            RESPONSE=$(curl -sf http://localhost:3100/health/deep 2>/dev/null || echo "")
            if [ -n "$RESPONSE" ] && echo "$RESPONSE" | grep -q '"status".*:.*"ok"'; then
              echo "Health check passed on attempt $i:"
              echo "$RESPONSE" | python3 -m json.tool
              HEALTHY=true
              break
            fi
            echo "Attempt $i/6 failed..."
            if [ -n "$RESPONSE" ]; then
              echo "$RESPONSE" | python3 -m json.tool 2>/dev/null || echo "$RESPONSE"
            fi
          done

          if [ "$HEALTHY" != "true" ]; then
            echo "Health check failed after 6 attempts! Attempting rollback..."
            if [ -n "$PREVIOUS_SHA" ] && sudo docker image inspect ai-cofounder-agent-server:${PREVIOUS_SHA} >/dev/null 2>&1; then
              echo "==> Rolling back to ${PREVIOUS_SHA:0:7}..."
              sudo docker tag ai-cofounder-agent-server:${PREVIOUS_SHA} ai-cofounder-agent-server:latest
              sudo docker tag ai-cofounder-discord-bot:${PREVIOUS_SHA} ai-cofounder-discord-bot:latest
              sudo docker tag ai-cofounder-slack-bot:${PREVIOUS_SHA} ai-cofounder-slack-bot:latest
              sudo docker compose -f docker-compose.prod.yml up -d --force-recreate

              ROLLBACK_OK=false
              for i in 1 2 3 4 5 6; do
                sleep 5
                RESPONSE=$(curl -sf http://localhost:3100/health/deep 2>/dev/null || echo "")
                if [ -n "$RESPONSE" ] && echo "$RESPONSE" | grep -q '"status".*:.*"ok"'; then
                  echo "Rollback successful on attempt $i:"
                  echo "$RESPONSE" | python3 -m json.tool
                  ROLLBACK_OK=true
                  break
                fi
                echo "Rollback attempt $i/6..."
              done

              # Write rollback state for notification steps to read
              if [ "$ROLLBACK_OK" = "true" ]; then
                printf 'ROLLBACK_STATUS=success\nROLLBACK_SHA=%s\n' "${PREVIOUS_SHA:0:7}" > /tmp/deploy_state
                echo "Rollback state written to /tmp/deploy_state"
              else
                echo "ROLLBACK_STATUS=failed" > /tmp/deploy_state
                echo "Rollback also failed after 6 attempts!"
              fi
            fi
            exit 1
          fi

          echo "==> Pruning images older than 72h..."
          sudo docker image prune -a --filter "until=72h" -f

          DEPLOY_END=$(date +%s)
          DEPLOY_DURATION=$((DEPLOY_END - DEPLOY_START))
          echo "==> Deploy complete (${SHORT_SHA}) in ${DEPLOY_DURATION}s!"
          EOF_DEPLOY_SCRIPT

      - name: Notify deploy completed
        if: success()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -sf -X POST "${DEPLOY_WEBHOOK_URL}/api/deploys/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_SECRET}" \
            -d "{\"event\":\"deploy_completed\",\"commitSha\":\"${COMMIT_SHA}\"}" \
            || echo "::warning::Deploy webhook notification failed (deploy_completed)"

      - name: Notify deploy failed
        if: failure()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          curl -sf -X POST "${DEPLOY_WEBHOOK_URL}/api/deploys/webhook" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_SECRET}" \
            -d "{\"event\":\"deploy_failed\",\"commitSha\":\"${COMMIT_SHA}\",\"error\":\"Deploy step failed — check GitHub Actions logs\"}" \
            || echo "::warning::Deploy webhook notification failed (deploy_failed)"

      - name: Notify deploy rolled back
        if: failure()
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # Read rollback state from deploy step (if it exists)
          if ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 ian@avion-stack-01 "cat /tmp/deploy_state 2>/dev/null" | grep -q "ROLLBACK_STATUS=success"; then
            ROLLBACK_SHA=$(ssh ian@avion-stack-01 "grep ROLLBACK_SHA /tmp/deploy_state 2>/dev/null | cut -d= -f2" || echo "unknown")
            curl -sf -X POST "${DEPLOY_WEBHOOK_URL}/api/deploys/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${DEPLOY_WEBHOOK_SECRET}" \
              -d "{\"event\":\"deploy_rolled_back\",\"commitSha\":\"${COMMIT_SHA}\",\"previousSha\":\"${ROLLBACK_SHA}\",\"error\":\"Health check failed, rolled back\"}" \
              || true
          fi
          ssh ian@avion-stack-01 "rm -f /tmp/deploy_state" 2>/dev/null || true

      - name: Notify Discord — Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"Deploy Successful\",\"description\":\"AI Cofounder deployed to production.\",\"color\":2278400,\"fields\":[{\"name\":\"Commit\",\"value\":\"\`${SHORT_SHA}\`\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"main\",\"inline\":true}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$DISCORD_WEBHOOK"

      - name: Notify Discord — Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          # Check if rollback succeeded
          ROLLBACK_INFO=$(ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=5 ian@avion-stack-01 "cat /tmp/deploy_state 2>/dev/null" 2>/dev/null || echo "")
          if echo "$ROLLBACK_INFO" | grep -q "ROLLBACK_STATUS=success"; then
            ROLLBACK_SHA=$(echo "$ROLLBACK_INFO" | grep ROLLBACK_SHA | cut -d= -f2)
            TITLE="Deploy Failed — Rolled Back to ${ROLLBACK_SHA}"
            DESC="Deploy of \`${SHORT_SHA}\` failed health check. Auto-rolled back to \`${ROLLBACK_SHA}\`."
            COLOR=16744192
          else
            TITLE="Deploy FAILED"
            DESC="AI Cofounder deploy to production failed! Manual intervention may be required."
            COLOR=15548997
          fi
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"${TITLE}\",\"description\":\"${DESC}\",\"color\":${COLOR},\"fields\":[{\"name\":\"Commit\",\"value\":\"\`${SHORT_SHA}\`\",\"inline\":true},{\"name\":\"Branch\",\"value\":\"main\",\"inline\":true},{\"name\":\"Action\",\"value\":\"[View logs](https://github.com/${REPO}/actions/runs/${RUN_ID})\",\"inline\":false}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}" \
            "$DISCORD_WEBHOOK"
