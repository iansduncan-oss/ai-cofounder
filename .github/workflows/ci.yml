name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ai_cofounder_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ci"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ai_cofounder_test
      ANTHROPIC_API_KEY: test-key-not-real

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --force

      - name: Lint
        run: npm run lint

      - name: Build all packages
        run: npm run build

      - name: Push schema to test DB
        run: npm run db:push

      - name: Run tests with coverage
        run: npm run test -- --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "No coverage summary found — skipping comment"
            exit 0
          fi

          COVERAGE=$(python3 -c "
          import json
          with open('coverage/coverage-summary.json') as f:
              data = json.load(f)
          total = data.get('total', {})
          lines = total.get('lines', {}).get('pct', 0)
          functions = total.get('functions', {}).get('pct', 0)
          branches = total.get('branches', {}).get('pct', 0)
          statements = total.get('statements', {}).get('pct', 0)
          print(f'| Lines | Functions | Branches | Statements |')
          print(f'|-------|-----------|----------|------------|')
          print(f'| {lines}% | {functions}% | {branches}% | {statements}% |')
          ")

          BODY="## Test Coverage

          ${COVERAGE}

          <sub>Generated by CI — [view full report](https://github.com/${REPO}/actions/runs/${RUN_ID})</sub>"

          # Delete previous coverage comments
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" --jq '.[] | select(.body | startswith("## Test Coverage")) | .id' | while read -r id; do
            gh api "repos/${REPO}/issues/comments/${id}" -X DELETE 2>/dev/null || true
          done

          # Post new comment
          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="${BODY}"
