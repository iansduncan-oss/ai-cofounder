services:
  agent-server:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-agent-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - API_SECRET=${API_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-100000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DISCORD_FOLLOWUP_WEBHOOK_URL=${DISCORD_FOLLOWUP_WEBHOOK_URL:-}
      - BRIEFING_HOUR=${BRIEFING_HOUR:-9}
      - BRIEFING_TIMEZONE=${BRIEFING_TIMEZONE:-America/New_York}
      - WORKSPACE_DIR=/data/workspace
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - N8N_SHARED_SECRET=${N8N_SHARED_SECRET:-}
    volumes:
      - workspace_data:/data/workspace
    networks:
      - avion_avion_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  discord-bot:
    image: ai-cofounder-discord-bot:latest
    container_name: ai-cofounder-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - AGENT_SERVER_URL=http://agent-server:3100
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

  slack-bot:
    image: ai-cofounder-slack-bot:latest
    container_name: ai-cofounder-slack-bot
    restart: unless-stopped
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - AGENT_SERVER_URL=http://agent-server:3100
      - API_SECRET=${API_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

volumes:
  workspace_data:

networks:
  avion_avion_net:
    external: true
