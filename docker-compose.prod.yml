services:
  agent-server:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-agent-server
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - API_SECRET=${API_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-100000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - avion_avion_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  discord-bot:
    image: ai-cofounder-discord-bot:latest
    container_name: ai-cofounder-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - AGENT_SERVER_URL=http://agent-server:3100
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

networks:
  avion_avion_net:
    external: true
