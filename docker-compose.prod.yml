name: ai-cofounder
services:
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ai-cofounder-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      INFO: 1
      POST: 1
    mem_limit: 64m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - avion_avion_net

  redis:
    image: redis:7-alpine
    container_name: ai-cofounder-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD}
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=${REDIS_PASSWORD} redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - avion_avion_net

  agent-server:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-agent-server
    restart: unless-stopped
    shm_size: "256m"
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - API_SECRET=${API_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-100000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - HF_API_KEY=${HF_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DISCORD_FOLLOWUP_WEBHOOK_URL=${DISCORD_FOLLOWUP_WEBHOOK_URL:-}
      - BRIEFING_HOUR=${BRIEFING_HOUR:-9}
      - BRIEFING_TIMEZONE=${BRIEFING_TIMEZONE:-America/New_York}
      - WORKSPACE_DIR=/data/workspace
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-}
      - GITHUB_DEFAULT_BRANCH=${GITHUB_DEFAULT_BRANCH:-main}
      - N8N_SHARED_SECRET=${N8N_SHARED_SECRET:-}
      - N8N_BASE_URL=${N8N_BASE_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - JWT_SECRET=${JWT_SECRET}
      - COOKIE_SECRET=${COOKIE_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - AUTONOMOUS_SESSION_INTERVAL_MINUTES=${AUTONOMOUS_SESSION_INTERVAL_MINUTES:-30}
      - SESSION_TOKEN_BUDGET=${SESSION_TOKEN_BUDGET:-50000}
      - SESSION_TIME_BUDGET_MS=${SESSION_TIME_BUDGET_MS:-900000}
      - VPS_HOST=host.docker.internal
      - VPS_USER=ian
      - SSH_KEY_PATH=/home/appuser/.ssh/id_ed25519
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - ENABLE_ADAPTIVE_ROUTING=${ENABLE_ADAPTIVE_ROUTING:-false}
      - APP_BASE_URL=${APP_BASE_URL:-https://app.aviontechs.com}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - DISCORD_WATCHER_ENABLED=${DISCORD_WATCHER_ENABLED:-false}
      - DISCORD_WATCHER_MIN_CONFIDENCE=${DISCORD_WATCHER_MIN_CONFIDENCE:-0.6}
      - DISCORD_WATCHER_QUIET_START=${DISCORD_WATCHER_QUIET_START:-}
      - DISCORD_WATCHER_QUIET_END=${DISCORD_WATCHER_QUIET_END:-}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_DM_USER_ID=${SLACK_DM_USER_ID:-}
      - SLACK_NOTIFICATION_CHANNEL=${SLACK_NOTIFICATION_CHANNEL:-}
    mem_limit: 1g
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - workspace_data:/data/workspace
      - /home/ian/.ssh/ai-cofounder-key:/home/appuser/.ssh/id_ed25519:ro
    networks:
      - avion_avion_net
    depends_on:
      redis:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-worker
    restart: unless-stopped
    command: ["node", "apps/agent-server/dist/worker.js"]
    stop_grace_period: 120s
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - HF_API_KEY=${HF_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - WORKSPACE_DIR=/data/workspace
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_REPO_OWNER=${GITHUB_REPO_OWNER:-}
      - GITHUB_REPO_NAME=${GITHUB_REPO_NAME:-}
      - GITHUB_DEFAULT_BRANCH=${GITHUB_DEFAULT_BRANCH:-main}
      - N8N_BASE_URL=${N8N_BASE_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      - TOKEN_ENCRYPTION_KEY=${TOKEN_ENCRYPTION_KEY:-}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-100000}
      - AUTONOMOUS_SESSION_INTERVAL_MINUTES=${AUTONOMOUS_SESSION_INTERVAL_MINUTES:-30}
      - SESSION_TOKEN_BUDGET=${SESSION_TOKEN_BUDGET:-50000}
      - SESSION_TIME_BUDGET_MS=${SESSION_TIME_BUDGET_MS:-900000}
      - DISCORD_FOLLOWUP_WEBHOOK_URL=${DISCORD_FOLLOWUP_WEBHOOK_URL:-}
      - DISCORD_TOKEN=${DISCORD_TOKEN:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - BRIEFING_HOUR=${BRIEFING_HOUR:-9}
      - BRIEFING_TIMEZONE=${BRIEFING_TIMEZONE:-America/Los_Angeles}
      - VPS_HOST=host.docker.internal
      - VPS_USER=ian
      - SSH_KEY_PATH=/home/appuser/.ssh/id_ed25519
      - ENABLE_ADAPTIVE_ROUTING=${ENABLE_ADAPTIVE_ROUTING:-false}
    mem_limit: 512m
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - workspace_data:/data/workspace
      - /home/ian/.ssh/ai-cofounder-key:/home/appuser/.ssh/id_ed25519:ro
    networks:
      - avion_avion_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  discord-bot:
    image: ai-cofounder-discord-bot:latest
    container_name: ai-cofounder-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - AGENT_SERVER_URL=http://agent-server:3100
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - API_SECRET=${API_SECRET:-}
      - DISCORD_WATCHER_ENABLED=${DISCORD_WATCHER_ENABLED:-false}
      - DISCORD_WATCHER_BATCH_INTERVAL_MS=${DISCORD_WATCHER_BATCH_INTERVAL_MS:-120000}
      - DISCORD_WATCHER_CHANNEL_ALLOWLIST=${DISCORD_WATCHER_CHANNEL_ALLOWLIST:-}
      - DISCORD_WATCHER_CHANNEL_BLOCKLIST=${DISCORD_WATCHER_CHANNEL_BLOCKLIST:-}
      - DISCORD_WATCHER_MAX_MESSAGES_PER_BATCH=${DISCORD_WATCHER_MAX_MESSAGES_PER_BATCH:-100}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    mem_limit: 256m
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

  slack-bot:
    image: ai-cofounder-slack-bot:latest
    container_name: ai-cofounder-slack-bot
    restart: unless-stopped
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - AGENT_SERVER_URL=http://agent-server:3100
      - API_SECRET=${API_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    mem_limit: 256m
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

volumes:
  workspace_data:
  redisdata:

networks:
  avion_avion_net:
    external: true
