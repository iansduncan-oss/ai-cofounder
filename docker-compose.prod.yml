services:
  redis:
    image: redis:7-alpine
    container_name: ai-cofounder-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - avion_avion_net

  agent-server:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-agent-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - API_SECRET=${API_SECRET:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-20}
      - RATE_LIMIT_WINDOW=${RATE_LIMIT_WINDOW:-60}
      - DAILY_TOKEN_LIMIT=${DAILY_TOKEN_LIMIT:-100000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - DISCORD_FOLLOWUP_WEBHOOK_URL=${DISCORD_FOLLOWUP_WEBHOOK_URL:-}
      - BRIEFING_HOUR=${BRIEFING_HOUR:-9}
      - BRIEFING_TIMEZONE=${BRIEFING_TIMEZONE:-America/New_York}
      - WORKSPACE_DIR=/data/workspace
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - N8N_SHARED_SECRET=${N8N_SHARED_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
    volumes:
      - workspace_data:/data/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - avion_avion_net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3100/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    image: ai-cofounder-agent-server:latest
    container_name: ai-cofounder-worker
    restart: unless-stopped
    command: ["node", "apps/agent-server/dist/worker.js"]
    stop_grace_period: 120s
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - WORKSPACE_DIR=/data/workspace
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - workspace_data:/data/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - avion_avion_net
    depends_on:
      redis:
        condition: service_healthy

  discord-bot:
    image: ai-cofounder-discord-bot:latest
    container_name: ai-cofounder-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
      - AGENT_SERVER_URL=http://agent-server:3100
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

  slack-bot:
    image: ai-cofounder-slack-bot:latest
    container_name: ai-cofounder-slack-bot
    restart: unless-stopped
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - AGENT_SERVER_URL=http://agent-server:3100
      - API_SECRET=${API_SECRET:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      agent-server:
        condition: service_healthy
    networks:
      - avion_avion_net

volumes:
  workspace_data:
  redisdata:

networks:
  avion_avion_net:
    external: true
