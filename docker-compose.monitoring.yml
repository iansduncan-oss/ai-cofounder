name: ai-cofounder-monitoring
services:
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: ai-cofounder-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=14d"
      - "--web.enable-lifecycle"
    mem_limit: 512m
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - avion_avion_net

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: ai-cofounder-alertmanager
    restart: unless-stopped
    environment:
      - ALERTMANAGER_DISCORD_WEBHOOK_URL=${ALERTMANAGER_DISCORD_WEBHOOK_URL}
    volumes:
      - ./infra/monitoring/alertmanager/alertmanager.yml:/tmp/alertmanager.yml.tpl:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|\$${ALERTMANAGER_DISCORD_WEBHOOK_URL}|$$ALERTMANAGER_DISCORD_WEBHOOK_URL|g" \
          /tmp/alertmanager.yml.tpl > /etc/alertmanager/alertmanager.yml
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml
    mem_limit: 128m
    ports:
      - "127.0.0.1:9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - avion_avion_net

  grafana:
    image: grafana/grafana:10.4.1
    container_name: ai-cofounder-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-https://grafana.aviontechs.com}
    volumes:
      - ./infra/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    mem_limit: 256m
    ports:
      - "127.0.0.1:3200:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - avion_avion_net

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: ai-cofounder-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    mem_limit: 128m
    networks:
      - avion_avion_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ai-cofounder-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    mem_limit: 256m
    networks:
      - avion_avion_net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: ai-cofounder-postgres-exporter
    restart: unless-stopped
    environment:
      - DATA_SOURCE_NAME=postgresql://avion:${POSTGRES_PASSWORD}@avion-postgres-1:5432/avion?sslmode=disable
    mem_limit: 128m
    networks:
      - avion_avion_net

  alertmanager-discord:
    image: benjojo/alertmanager-discord:latest
    container_name: ai-cofounder-alertmanager-discord
    restart: unless-stopped
    environment:
      - DISCORD_WEBHOOK=${ALERTMANAGER_DISCORD_WEBHOOK_URL}
    mem_limit: 64m
    networks:
      - avion_avion_net

volumes:
  prometheus_data:
    external: true
    name: ai-cofounder_prometheus_data
  grafana_data:
    external: true
    name: ai-cofounder_grafana_data

networks:
  avion_avion_net:
    external: true
